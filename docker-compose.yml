version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fts-absen-app
    container_name: fts-absen-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ftsabsen
      - DB_USERNAME=ftsabsen_user
      - DB_PASSWORD=secret
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: fts-absen-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ftsabsen
      MYSQL_USER: ftsabsen_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Uncomment the next line and place your SQL dump in the right path to auto-initialize
      - ./ftsabsen-new.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
